<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Expense Tracker</title>
    <base href="/" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <link rel="manifest" href="assets/manifest.json" />
    <link rel="icon" type="image/png" href="assets/icon/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      #app-splash {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: linear-gradient(135deg, #fdfaf2 0%, #f7f3e9 100%);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 99999; transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
      }
      .splash-logo {
        width: 110px; height: 110px; background: #c5a028; border-radius: 36px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 25px 50px rgba(197, 160, 40, 0.3);
        margin-bottom: 28px; animation: splash-float 3s infinite ease-in-out;
      }
      .splash-logo svg { width: 56px; height: 56px; fill: white; }
      .splash-title {
        font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 700;
        color: #2c2c2c; letter-spacing: 2px; margin-bottom: 8px;
        background: linear-gradient(to bottom, #2c2c2c, #555);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      .splash-subtitle {
        font-family: 'Outfit', sans-serif; font-size: 13px; color: #8a8a8a;
        font-weight: 600; letter-spacing: 3px; text-transform: uppercase;
      }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-10px) scale(1.02); }
      }
      body.app-ready #app-splash { opacity: 0; visibility: hidden; }
    </style>
    <!-- Google API client - loaded for OAuth flow -->
  </head>

  <body>
    <div id="app-splash">
      <div class="splash-logo">
        <svg viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2-.9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
      </div>
      <div class="splash-title">CostTrack</div>
      <div class="splash-subtitle">Elite Expense Tracking</div>
    </div>
    <app-root></app-root>
  </body>


</html>
