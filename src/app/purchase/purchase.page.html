<ion-header class="ion-no-border">
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>New Purchase</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

<ion-content>

  <form [formGroup]="form" (ngSubmit)="submit()">

    <div class="section-label">Receipt Photo</div>
    <div style="margin: 0 16px 16px;">
      <div *ngIf="capturedImage; else noImage">
        <img [src]="capturedImage.dataUrl" alt="Captured receipt" class="preview-image" style="margin-top:0;" />
        <ion-button expand="block" fill="outline" color="danger" (click)="removeImage()" style="margin-top: 8px; --border-radius: 8px;">
          <ion-icon slot="start" name="trash-outline"></ion-icon>
          Retake Photo
        </ion-button>
      </div>

      <ng-template #noImage>
        <div class="image-placeholder" (click)="takePicture()" style="margin-top:0;">
          <ion-icon name="camera-outline"></ion-icon>
          <p>Tap to scan receipt...</p>
        </div>
      </ng-template>
    </div>

    <div class="section-label">Purchase Details</div>
    <ion-list inset="true" style="margin: 0 16px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-radius: 12px; border: 1px solid rgba(0,0,0,0.05);">
      
      <!-- Date -->
      <ion-item lines="full">
        <ion-icon slot="start" name="calendar-outline" color="secondary"></ion-icon>
        <ion-label style="font-size: 15px; font-weight: 500;">Date</ion-label>
        <ion-datetime-button datetime="purchase-datetime"></ion-datetime-button>
        <ion-modal [keepContentsMounted]="true">
          <ng-template>
            <ion-datetime id="purchase-datetime" formControlName="date" presentation="date" [max]="maxDate" [min]="minDate" color="secondary"></ion-datetime>
          </ng-template>
        </ion-modal>
      </ion-item>
      
      <!-- Payment Type -->
      <ion-item lines="full">
        <ion-icon slot="start" name="card-outline" color="secondary"></ion-icon>
        <ion-select formControlName="paymentType" placeholder="Payment Method" interface="action-sheet">
          <ion-select-option *ngFor="let option of paymentOptions" [value]="option.value">{{ option.label }}</ion-select-option>
        </ion-select>
      </ion-item>

      <div *ngIf="paymentTypeCtrl.value" style="padding: 12px 16px; background: rgba(0,0,0,0.02); text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05);">
        <ion-chip [color]="paymentTypeCtrl.value === 'self' ? 'tertiary' : 'secondary'" outline="false" style="margin:0;">
          <ion-icon [name]="paymentTypeCtrl.value === 'self' ? 'person-outline' : 'business-outline'"></ion-icon>
          <ion-label>{{ getSelectedPaymentLabel() }}</ion-label>
        </ion-chip>
      </div>

      <!-- Description -->
      <ion-item lines="none">
        <ion-icon slot="start" name="document-text-outline" color="secondary"></ion-icon>
        <ion-textarea formControlName="description" placeholder="Description of purchase..." rows="3" [counter]="true" maxlength="500" auto-grow="true"></ion-textarea>
      </ion-item>
    </ion-list>
    
    <ion-note *ngIf="form.invalid && form.touched" color="danger" style="display: block; text-align: center; margin-bottom: 12px;">Please fill in all required fields.</ion-note>

    <!-- Submit -->
    <ion-button type="submit" expand="block" color="secondary" class="submit-btn" [disabled]="isSubmitting">
      <ion-icon slot="start" [name]="isAuthenticated ? 'cloud-upload-outline' : 'log-in-outline'"></ion-icon>
      <span *ngIf="!isAuthenticated">Sign in &amp; Submit</span>
      <span *ngIf="isAuthenticated">{{ isSubmitting ? 'Uploading…' : 'Submit Purchase' }}</span>
    </ion-button>
    <p style="text-align: center; color: var(--ion-color-medium); font-size: 13px; margin: 16px; opacity: 0.8;">
      <ion-icon name="cloud-done-outline"></ion-icon> Securely uploads to Google Drive.
    </p>

  </form>

</ion-content>
