<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" text=""></ion-back-button>
    </ion-buttons>
    <ion-title>New Expense</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <form [formGroup]="form" (ngSubmit)="submit()">

    <!-- Receipt Photo -->
    <div class="section-label">Receipt Photo <span class="required">*</span></div>
    <div style="margin: 0 20px 16px;">
      <div *ngIf="capturedImage; else noImage">
        <img [src]="capturedImage.dataUrl" alt="Captured receipt" class="preview-image" />
        <div style="display:flex; gap:8px; margin-top:8px;">
          <ion-button expand="block" fill="outline" color="primary" (click)="showImageOptions()" style="flex:1; --border-radius:12px;">
            <ion-icon slot="start" name="camera-outline"></ion-icon>
            Retake
          </ion-button>
          <ion-button expand="block" fill="outline" color="danger" (click)="removeImage()" style="flex:1; --border-radius:12px;">
            <ion-icon slot="start" name="trash-outline"></ion-icon>
            Remove
          </ion-button>
        </div>
      </div>

      <ng-template #noImage>
        <div class="image-placeholder" (click)="showImageOptions()">
          <ion-icon name="camera-outline"></ion-icon>
          <p>Tap to attach receipt</p>
          <span class="image-hint">Camera or Gallery</span>
        </div>
      </ng-template>
    </div>

    <!-- Expense Details -->
    <div class="section-label">Expense Details</div>
    <div class="form-card" style="margin: 0 20px 8px;">

      <!-- Name -->
      <ion-item lines="full">
        <ion-icon slot="start" name="pricetag-outline" color="primary"></ion-icon>
        <ion-input formControlName="name" placeholder="Receipt Name (e.g. Team Lunch)" clearInput="true" type="text"></ion-input>
      </ion-item>
      <ion-note *ngIf="nameCtrl.invalid && nameCtrl.touched" color="danger" class="field-error">
        Name is required (min 2 characters).
      </ion-note>

      <!-- Date -->
      <ion-item lines="full">
        <ion-icon slot="start" name="calendar-outline" color="primary"></ion-icon>
        <ion-label style="font-size:15px; font-weight:500;">Date</ion-label>
        <ion-datetime-button datetime="expense-datetime"></ion-datetime-button>
        <ion-modal [keepContentsMounted]="true">
          <ng-template>
            <ion-datetime id="expense-datetime" formControlName="date" presentation="date" [max]="maxDate" color="primary"></ion-datetime>
          </ng-template>
        </ion-modal>
      </ion-item>

      <!-- Description (optional) -->
      <ion-item lines="none">
        <ion-icon slot="start" name="document-text-outline" color="primary"></ion-icon>
        <ion-textarea
          formControlName="description"
          placeholder="Description (optional)"
          rows="3"
          [counter]="true"
          maxlength="500"
          auto-grow="true">
        </ion-textarea>
      </ion-item>
    </div>

    <!-- Category badge -->
    <div style="text-align:center; margin: 8px 20px 24px;">
      <ion-chip color="primary" outline="false">
        <ion-icon name="receipt-outline"></ion-icon>
        <ion-label>Category: Expense</ion-label>
      </ion-chip>
    </div>

    <!-- Submit -->
    <ion-button
      type="submit"
      expand="block"
      color="primary"
      class="submit-btn"
      [disabled]="isSubmitting">
      <ion-icon slot="start" [name]="isAuthenticated ? 'cloud-upload-outline' : 'log-in-outline'"></ion-icon>
      <span *ngIf="!isAuthenticated">Sign in &amp; Submit</span>
      <span *ngIf="isAuthenticated">{{ isSubmitting ? 'Processing…' : 'Submit Expense' }}</span>
    </ion-button>

    <p class="upload-note">
      <ion-icon name="shield-checkmark-outline"></ion-icon>
      Receipts are saved to your Google Drive securely.
    </p>

  </form>
</ion-content>
